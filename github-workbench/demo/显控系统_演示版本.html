<script>
(function(){const img={teacher:'老师机位.png',camera:'摄像头.png',cameraAlt:'摄像头画面.png',pc:'电脑画面.png',platform:'平台.png',platformData:'平台数据.png',welcome:'欢迎场景.png'};const scenes=[{id:'cockpit',name:'校领导驾驶舱',patrol:false,render:'cockpit'},{id:'lesson',name:'智能巡课',patrol:true,render:'lesson',interval:5000},{id:'exam',name:'智能巡考',patrol:true,render:'exam',interval:5000},{id:'ops',name:'运维管理',patrol:false,render:'ops'},{id:'supervise',name:'督导听课',patrol:true,render:'supervise',interval:5000},{id:'welcome',name:'接待欢迎',patrol:false,render:'welcome'}];const sources=[{id:'pc-ops',name:'运维平台-主控电脑',type:'pc',typeName:'电脑画面',building:'运行中心',floor:'平台',room:'运维',kind:'电脑',img:img.pc},{id:'pc-cockpit',name:'校领导驾驶舱-数据平台',type:'pc',typeName:'电脑画面',building:'运行中心',floor:'平台',room:'驾驶舱',kind:'电脑',img:img.platformData},{id:'pc-course',name:'思政楼-2层-201-课件机位',type:'pc',typeName:'电脑画面',building:'思政楼',floor:'2层',room:'201',kind:'课件',img:img.platform},{id:'pc-welcome',name:'接待欢迎-宣传画面',type:'pc',typeName:'电脑画面',building:'运行中心',floor:'平台',room:'接待',kind:'电脑',img:img.welcome}];['101','102','103','104','105','106','107','108','201','202','203','204','205','206','301','302','303','304','401','402','403','404','502','503','504'].forEach((room,i)=>{sources.push({id:'cam-t-'+room,name:`思政楼-${room[0]}层-${room}-老师机位`,type:'camera',typeName:'摄像头画面',building:'思政楼',floor:room[0]+'层',room,kind:'老师机位',img:i%2?img.teacher:img.camera});sources.push({id:'cam-s-'+room,name:`思政楼-${room[0]}层-${room}-学生机位`,type:'camera',typeName:'摄像头画面',building:'思政楼',floor:room[0]+'层',room,kind:'学生机位',img:img.cameraAlt});sources.push({id:'pc-course-'+room,name:`思政楼-${room[0]}层-${room}-课件机位`,type:'pc',typeName:'电脑画面',building:'思政楼',floor:room[0]+'层',room,kind:'课件机位',img:img.platform})});let current=scenes[0],selected=null,filter='all',dragMode='replace',patrolTimer=null,patrolIndex=0,dragging=null,clickLock=false,audioSource=null,enlargedScene=null,patrolScope='所有有课教室';const $=s=>document.querySelector(s),grid=$('#echoGrid'),track=$('#sourceTrack'),toastEl=$('#toast');function toast(msg){toastEl.textContent=msg;toastEl.style.display='block';clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.style.display='none',1800)}function src(id){return sources.find(s=>s.id===id)||sources[0]}function cams(){return sources.filter(s=>s.type==='camera')}function windowHtml(s){return `<div class="codex-label">${s.name}</div><img src="${s.img}" alt="${s.name}"><div class="win-actions"><button class="win-action-btn" data-win-act="remote">反控</button><button class="win-action-btn" data-win-act="mute">音量</button><button class="win-action-btn" data-win-act="enlarge">放大</button></div>`}function addWindow(x,y,w,h,s){const d=document.createElement('div');d.className='codex-window'+(s.id==='pc-welcome'||s.id==='pc-cockpit'?' welcome-fill':'');d.dataset.id=s.id;d.dataset.type=s.type;Object.assign(d.style,{left:x+'%',top:y+'%',width:w+'%',height:h+'%'});d.innerHTML=windowHtml(s);d.onclick=e=>selectWindow(e,d);grid.appendChild(d)}function renderScene(batch=0){enlargedScene=null;grid.innerHTML='';if(current.render==='cockpit'){addWindow(0,0,20,33.333,src('cam-t-101'));addWindow(0,33.333,20,33.333,src('cam-t-102'));addWindow(0,66.666,20,33.334,src('cam-t-103'));addWindow(20,0,60,100,src('pc-cockpit'));addWindow(80,0,20,33.333,src('cam-t-201'));addWindow(80,33.333,20,33.333,src('cam-t-202'));addWindow(80,66.666,20,33.334,src('cam-t-203'))}if(current.render==='lesson'){const c=cams();for(let i=0;i<9;i++)addWindow((i%3)*33.333,Math.floor(i/3)*33.333,33.333,33.333,c[(batch*3+i)%c.length])}if(current.render==='exam'){const c=cams();for(let i=0;i<24;i++)addWindow((i%6)*16.666,Math.floor(i/6)*25,16.666,25,c[(batch*6+i)%c.length])}if(current.render==='ops')addWindow(0,0,100,100,src('pc-ops'));if(current.render==='supervise'){const rooms=['101','102','103','104','201','202','203','204','301','302','303','304'];const room=rooms[batch%rooms.length];addWindow(0,0,68,100,src('cam-t-'+room));addWindow(68,0,32,50,src('cam-s-'+room));addWindow(68,50,32,50,src('pc-course-'+room))}if(current.render==='welcome'){addWindow(0,0,100,100,src('pc-welcome'))}updateTourButton()}function renderSources(highlight){const list=sources.filter(s=>filter==='all'||s.type===filter);track.innerHTML=list.map(s=>`<div class="src-card ${selected&&selected.id===s.id?'selected':''} ${highlight===s.id?'highlight':''}" data-id="${s.id}" data-type="${s.type}"><img class="src-card-img" src="${s.img}"><span class="src-kind">${s.type==='pc'?'PC':'CAM'}</span><div class="src-name">${s.name}</div><div class="src-hover-overlay"><div class="overlay-icons"><div class="overlay-icon-btn" data-act="preview">⌕</div><div class="overlay-icon-btn" data-act="mute">🔇</div><div class="overlay-icon-btn" data-act="remote">▣</div></div><div class="overlay-tip-text">长按可拖拽上墙</div><div class="overlay-sub-text">当前拖拽逻辑：${dragMode==='replace'?'替换信号源':'放大上墙'}</div></div></div>`).join('');track.querySelectorAll('.src-card').forEach(card=>{const s=src(card.dataset.id);card.onclick=e=>{if(clickLock){clickLock=false;return}const act=e.target.dataset.act;if(act==='preview')return openPreview(s);if(act==='mute')return toggleAudio(s);if(act==='remote')return s.type==='pc'?openKVM(s):toast('该信号源不支持反控');selected=s;renderSources()};card.onpointerdown=e=>startDrag(e,s)});if(highlight)setTimeout(()=>$('#sourceTrack .highlight')?.scrollIntoView({inline:'center',block:'nearest'}),60)}function startDrag(e,s){if(e.target.dataset.act||e.button>0)return;e.preventDefault();const sx=e.clientX,sy=e.clientY;let active=false;const move=ev=>{const dist=Math.hypot(ev.clientX-sx,ev.clientY-sy);if(!active&&dist<6)return;if(!active){active=true;clickLock=true;selected=s;const g=document.createElement('div');g.className='drag-ghost';g.innerHTML=`<img class="src-card-img" src="${s.img}"><div class="src-name">${s.name}</div>`;document.body.appendChild(g);dragging={source:s,ghost:g};renderSources()}if(dragging){dragging.ghost.style.left=ev.clientX-98+'px';dragging.ghost.style.top=ev.clientY-62+'px';markDrop(ev.clientX,ev.clientY)}};const up=ev=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);document.querySelectorAll('.codex-window').forEach(w=>w.classList.remove('drop-ok'));if(!dragging)return;const source=dragging.source;dragging.ghost.remove();dragging=null;const el=document.elementFromPoint(ev.clientX,ev.clientY);const win=el?.closest?.('.codex-window');const inside=grid.contains(el);if(dragMode==='replace'&&win){win.dataset.id=source.id;win.dataset.type=source.type;win.innerHTML=windowHtml(source);toast('已替换目标窗口：'+source.name)}else if(dragMode==='enlarge'&&inside){showEnlarged(source);toast('已放大上墙：'+source.name)}else toast('拖拽已取消')};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up)}function markDrop(x,y){document.querySelectorAll('.codex-window').forEach(w=>w.classList.remove('drop-ok'));const el=document.elementFromPoint(x,y);const win=el?.closest?.('.codex-window');if(dragMode==='replace'&&win)win.classList.add('drop-ok')}function selectWindow(e,win){e.stopPropagation();document.querySelectorAll('.codex-window').forEach(w=>w.classList.remove('win-selected'));win.classList.add('win-selected');const s=src(win.dataset.id);selected=s;const act=e.target.dataset.winAct;if(act==='remote'){return s.type==='pc'?openKVM(s):toast('该窗口信号源不支持反控')}if(act==='mute'){return toggleAudio(s)}if(act==='enlarge'){showEnlarged(s);toast('已放大展示：'+s.name)}}function setScene(i){stopPatrol();current=scenes[i];document.querySelectorAll('.scene-item').forEach((n,idx)=>n.classList.toggle('active',idx===i));renderScene()}function updateTourButton(){const b=$('#tourMasterBtn'),t=$('#tourBtnText');b.disabled=!current.patrol;b.style.opacity=current.patrol?'1':'.35';t.textContent=patrolTimer?'轮巡暂停':'轮巡开启'}function startPatrol(){if(!current.patrol)return;document.getElementById('patrolStatusScope').textContent=patrolScope;document.getElementById('patrolStatusBar').classList.add('show');patrolTimer=setInterval(()=>{patrolIndex++;renderScene(patrolIndex)},current.interval||5000);updateTourButton();toast('轮巡已开启')}function stopPatrol(){if(patrolTimer)clearInterval(patrolTimer);patrolTimer=null;document.getElementById('patrolStatusBar')?.classList.remove('show');updateTourButton()}function showModal(content,wide=false){let mask=$('#demoModalMask');if(!mask){mask=document.createElement('div');mask.id='demoModalMask';mask.className='demo-modal-mask';mask.innerHTML='<div id="demoModalBox" class="demo-modal"></div>';document.body.appendChild(mask);mask.onclick=e=>{if(e.target===mask)closeModal()}}const box=$('#demoModalBox');box.className='demo-modal'+(wide?' wide':'');box.innerHTML=content;mask.classList.add('show')}function closeModal(){$('#demoModalMask')?.classList.remove('show')}function openMode(){showModal(`<div class="demo-modal-head"><span>拖拽交互模式</span><button class="demo-x" onclick="window.demoCloseModal()">×</button></div><div class="mode-grid"><button class="mode-card ${dragMode==='enlarge'?'active':''}" onclick="window.demoSetMode('enlarge')"><b>上屏放大展示</b><span>拖拽画面至大屏中央后直接放大显示，影响回显区。</span></button><button class="mode-card ${dragMode==='replace'?'active':''}" onclick="window.demoSetMode('replace')"><b>替换窗口信号</b><span>替换当前场景下指定窗口里的信号源。</span></button></div>`)}function openPreview(s){showModal(`<div class="demo-modal-head"><span>本地预览：${s.name}</span><button class="demo-x" onclick="window.demoCloseModal()">×</button></div><div class="preview-box"><img src="${s.img}"></div>`,true)}function openVolume(){showModal(`<div class="demo-modal-head"><span>音量调节</span><button class="demo-x" onclick="window.demoCloseModal()">×</button></div><div class="vol-row">输出通道<select><option>本地扬声器</option><option>HDMI输出</option><option>外接音箱</option></select></div><div class="vol-row">主音量<input type="range" min="0" max="100" value="88"></div><div class="vol-row">麦克风检测<div class="meter">${'<i></i>'.repeat(14)}</div></div>`)}function openKVM(s){showModal(`<div class="demo-modal-head"><span>远程反控：${s.name}</span><button class="demo-x" onclick="window.demoCloseModal()">退出</button></div><div class="preview-box"><img src="${s.img}"></div>`,true)}function showEnlarged(s){stopPatrol();if(!enlargedScene)enlargedScene={scene:current,index:patrolIndex};grid.innerHTML='';addWindow(0,0,100,100,s);const btn=document.createElement('button');btn.className='return-scene-btn';btn.textContent='返回场景';btn.onclick=()=>{const b=enlargedScene;enlargedScene=null;if(b){current=b.scene;renderScene(b.index)}else renderScene()};grid.appendChild(btn)}function toggleAudio(s){if(audioSource&&audioSource.id===s.id){clearAudio();return}audioSource=s;const box=document.getElementById('audioMonitor'),name=document.getElementById('audioName');name.textContent=s.name;box.classList.add('show');toast('已开启监听：'+s.name)}function clearAudio(){audioSource=null;document.getElementById('audioMonitor')?.classList.remove('show');toast('已静音')}function openPatrolPanel(){if(!current.patrol)return;const running=!!patrolTimer;const chips=running?`<div class="vol-row"><b>当前过滤策略</b><div class="patrol-chips"><button class="patrol-chip ${patrolScope==='所有有课教室'?'active':''}" onclick="window.demoSetPatrolScope('所有有课教室')">🌐 所有有课</button><button class="patrol-chip ${patrolScope==='思政楼'?'active':''}" onclick="window.demoSetPatrolScope('思政楼')">▦ 思政楼</button><button class="patrol-chip ${patrolScope==='北教1楼'?'active':''}" onclick="window.demoSetPatrolScope('北教1楼')">▦ 北教1楼</button></div></div>`:'';showModal(`<div class="demo-modal-head"><span>▰ 自动轮巡</span><span style="font-size:12px;color:#8fa8d5">${running?'● 轮巡中':'已停止'}</span><button class="demo-x" onclick="window.demoCloseModal()">×</button></div><div class="vol-row" style="border:1px solid #123e75;border-radius:10px;padding:16px;background:#071026"><div style="display:flex;justify-content:space-between;align-items:center"><div><b style="color:#08cfff;font-size:18px">自动轮巡控制开关</b><div style="color:#8fa8d5;margin-top:6px">${running?'当前已进入自动化巡课状态':'开启后将按设定间隔轮巡教室画面'}</div></div><button class="patrol-switch ${running?'on':''}" onclick="window.demoTogglePatrolFromModal()"></button></div></div>${chips}`)}function openTree(keyword=''){let p=$('#treePanelDemo');if(!p){p=document.createElement('div');p.id='treePanelDemo';p.className='tree-panel-demo';p.innerHTML='<div class="tree-head"><span>信号源结构树</span><button class="demo-x" id="treeCloseDemo">×</button></div><div class="tree-body" id="treeBodyDemo"></div>';document.body.appendChild(p);$('#treeCloseDemo').onclick=()=>p.classList.remove('show')}const kw=(keyword||'').trim();const list=kw?sources.filter(s=>s.name.includes(kw)||s.room.includes(kw)||s.building.includes(kw)||s.kind.includes(kw)):sources;const groups={};list.forEach(s=>{groups[s.building]??={};groups[s.building][s.floor]??=[];groups[s.building][s.floor].push(s)});$('#treeBodyDemo').innerHTML=Object.keys(groups).map(b=>`<div class="tree-node group">${b}⌄</div>`+Object.keys(groups[b]).map(f=>`<div class="tree-node floor">${f}⌄</div>`+groups[b][f].map(s=>`<div class="tree-node item" data-id="${s.id}">${kw?s.name.replaceAll(kw,`<span class="tree-hit">${kw}</span>`):s.name}</div>`).join('')).join('')).join('')||'<div class="tree-node">未找到匹配结果</div>';$('#treeBodyDemo').querySelectorAll('.item').forEach(n=>n.onclick=()=>{selected=src(n.dataset.id);filter='all';renderSources(selected.id);p.classList.remove('show');toast('已定位：'+selected.name)});p.classList.add('show')}function admin(){let a=$('#adminDemo');if(!a){a=document.createElement('div');a.id='adminDemo';a.className='admin-demo';document.body.appendChild(a)}const nav=[['sources','信号源管理'],['display','显示屏配置'],['scene','场景预设'],['system','系统设置']];function content(tab){if(tab==='sources')return `<div class="admin-cards"><div class="admin-card">信号源总数<br><b>${sources.length}</b></div><div class="admin-card">电脑画面<br><b>${sources.filter(s=>s.type==='pc').length}</b></div><div class="admin-card">摄像头画面<br><b>${sources.filter(s=>s.type==='camera').length}</b></div><div class="admin-card">在线状态<br><b>${sources.length-2}</b></div></div><table class="admin-table2"><tr><th>名称</th><th>类型</th><th>结构树</th><th>接入</th></tr>${sources.map(s=>`<tr><td>${s.name}</td><td>${s.typeName}</td><td>${s.building}/${s.floor}/${s.room}</td><td>RTSP / 编码器</td></tr>`).join('')}</table>`;if(tab==='display')return `<div class="admin-cards"><div class="admin-card">物理布局<br><b>3×3</b></div><div class="admin-card">端口映射<br><b>自动</b></div><div class="admin-card">错接校正<br><b>支持</b></div><div class="admin-card">输出端口<br><b>9</b></div></div>`;if(tab==='scene')return `<div class="admin-cards">${scenes.map(s=>`<div class="admin-card">${s.name}<br><b>${s.patrol?'轮巡':'静态'}</b></div>`).join('')}</div><p>场景由布局、信号源绑定、轮巡策略和前端展示顺序组成。</p>`;return `<div class="admin-cards"><div class="admin-card">终端IP<br><b>DHCP</b></div><div class="admin-card">密码管理<br><b>6位</b></div><div class="admin-card">日志导出<br><b>支持</b></div><div class="admin-card">版本升级<br><b>支持</b></div></div>`}window.demoAdmin=tab=>{a.innerHTML=`<aside class="admin-side"><h2>ADMIN 配置后台</h2>${nav.map(n=>`<button class="${tab===n[0]?'active':''}" onclick="window.demoAdmin('${n[0]}')">${n[1]}</button>`).join('')}<button onclick="document.getElementById('adminDemo').classList.remove('show')">返回前端</button></aside><main class="admin-main"><h1>${nav.find(n=>n[0]===tab)[1]}</h1>${content(tab)}</main>`;a.classList.add('show')};window.demoAdmin('sources')}function init(){document.getElementById('sceneContainer').innerHTML=scenes.map((s,i)=>`<div class="scene-item ${i===0?'active':''}">${s.name}</div>`).join('');document.querySelectorAll('.scene-item').forEach((n,i)=>n.onclick=()=>setScene(i));document.querySelectorAll('.cate-btn').forEach((b,i)=>b.onclick=()=>{filter=['all','pc','camera'][i];document.querySelectorAll('.cate-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderSources()});$('#treeOpenBtn').onclick=()=>openTree($('#srcSearchInput').value);$('#srcSearchInput').onkeydown=e=>{if(e.key==='Enter')openTree(e.target.value)};$('#prevSrc').onclick=()=>track.scrollBy({left:-240,behavior:'smooth'});$('#nextSrc').onclick=()=>track.scrollBy({left:240,behavior:'smooth'});$('#modeBtn').onclick=openMode;$('#volumeBtn').onclick=openVolume;$('#kvmLauncher').onclick=()=>selected&&selected.type==='pc'?openKVM(selected):toast('请选择电脑信号源');$('#tourMasterBtn').onclick=()=>{patrolTimer?stopPatrol():openPatrolPanel()};$('#resetBtn').onclick=()=>renderScene();$('#adminBtn').onclick=admin;$('#audioMuteBtn').onclick=clearAudio;grid.onclick=e=>{if(e.target===grid)document.querySelectorAll('.codex-window').forEach(w=>w.classList.remove('win-selected'))};window.demoCloseModal=closeModal;window.demoTogglePatrolFromModal=()=>{patrolTimer?stopPatrol():startPatrol();openPatrolPanel()};window.demoSetPatrolScope=s=>{patrolScope=s;if(patrolTimer)document.getElementById('patrolStatusScope').textContent=s;openPatrolPanel()};window.demoSetMode=m=>{dragMode=m;$('#modeText').textContent='拖拽模式：'+(m==='replace'?'替换信号源':'放大上墙');closeModal();renderSources();toast($('#modeText').textContent)};renderScene();renderSources()}init()})();
</script>
